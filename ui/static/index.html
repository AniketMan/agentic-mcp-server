<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE 5.6 Level Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   Design Tokens
   ========================================================================== */
:root {
  --color-bg:            oklch(0.08 0.01 260);
  --color-surface:       oklch(0.12 0.01 260);
  --color-elevated:      oklch(0.16 0.01 260);
  --color-raised:        oklch(0.20 0.01 260);
  --color-border:        oklch(0.20 0.01 260);
  --color-border-subtle: oklch(0.16 0.01 260);
  --color-text:          oklch(0.90 0.01 80);
  --color-text-secondary:oklch(0.65 0.02 260);
  --color-text-muted:    oklch(0.45 0.02 260);
  --color-accent:        oklch(0.78 0.13 75);
  --color-accent-dim:    oklch(0.78 0.13 75 / 0.12);
  --color-accent-glow:   oklch(0.78 0.13 75 / 0.20);
  --color-success:       oklch(0.70 0.15 145);
  --color-success-dim:   oklch(0.70 0.15 145 / 0.12);
  --color-error:         oklch(0.65 0.20 25);
  --color-error-dim:     oklch(0.65 0.20 25 / 0.12);
  --color-warning:       oklch(0.72 0.14 85);
  --color-warning-dim:   oklch(0.72 0.14 85 / 0.12);
  --color-info:          oklch(0.75 0.12 220);
  --color-info-dim:      oklch(0.75 0.12 220 / 0.12);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-6: 1.5rem; --space-8: 2rem; --space-12: 3rem; --space-16: 4rem;

  --text-xs: 0.64rem; --text-sm: 0.8rem; --text-base: 1rem;
  --text-lg: 1.25rem; --text-xl: 1.563rem; --text-2xl: 1.953rem; --text-3xl: 2.441rem;

  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;

  --ease-snappy:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-cinematic: cubic-bezier(0.16, 1, 0.3, 1);

  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.4);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.5);
  --shadow-3d: 0 4px 0 oklch(0.06 0.01 260);
}

/* ==========================================================================
   Reset
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: clamp(14px, 0.5vw + 12px, 16px); -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}
a { color: var(--color-accent); text-decoration: none; }
a:hover { text-decoration: underline; }
ul { list-style: none; }

/* ==========================================================================
   Layout — Sidebar + Content (FIX #1: content scrolls naturally)
   ========================================================================== */
.app-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
}

/* ==========================================================================
   Header
   ========================================================================== */
.app-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-6);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border-subtle);
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(12px);
}
.app-header__brand {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
}
.app-header__brand em {
  font-style: normal;
  font-weight: 400;
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  margin-left: var(--space-2);
}
.app-header__meta {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}
.status-indicator {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
}
.status-indicator__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-text-muted);
  flex-shrink: 0;
}
.status-indicator__dot--ok {
  background: var(--color-success);
  box-shadow: 0 0 6px var(--color-success);
}
.status-indicator__dot--err {
  background: var(--color-error);
  box-shadow: 0 0 6px var(--color-error);
}
.file-badge {
  display: inline-flex;
  align-items: center;
  padding: var(--space-1) var(--space-3);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.file-badge--map {
  background: var(--color-accent-dim);
  color: var(--color-accent);
  border: 1px solid oklch(0.78 0.13 75 / 0.25);
}
.file-badge--asset {
  background: var(--color-success-dim);
  color: var(--color-success);
  border: 1px solid oklch(0.70 0.15 145 / 0.25);
}
.file-badge--version {
  background: var(--color-elevated);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}

/* ==========================================================================
   Sidebar — sticky, independent scroll
   ========================================================================== */
.sidebar {
  background: var(--color-surface);
  border-right: 1px solid var(--color-border-subtle);
  overflow-y: auto;
  height: calc(100vh - 52px);
  position: sticky;
  top: 52px;
  align-self: start;
}
@media (max-width: 768px) {
  .sidebar { height: auto; max-height: 240px; position: static; }
}
.sidebar__section {
  padding: var(--space-4) 0;
  border-bottom: 1px solid var(--color-border-subtle);
}
.sidebar__section:last-child { border-bottom: none; }
.sidebar__heading {
  padding: 0 var(--space-4) var(--space-2);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--color-text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar__heading .count-badge {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  background: var(--color-elevated);
  padding: 0 var(--space-2);
  border-radius: var(--radius-sm);
  letter-spacing: 0;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text-secondary);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: color 200ms var(--ease-snappy),
              background 200ms var(--ease-snappy),
              border-color 200ms var(--ease-snappy);
  user-select: none;
  min-height: 44px;
  outline: none;
}
.nav-item:hover {
  color: var(--color-text);
  background: oklch(0.14 0.01 260);
}
.nav-item:focus-visible {
  color: var(--color-text);
  background: oklch(0.14 0.01 260);
  border-left-color: var(--color-accent);
}
.nav-item--active {
  color: var(--color-accent);
  background: var(--color-accent-dim);
  border-left-color: var(--color-accent);
}
.nav-item__icon {
  width: 20px; height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 600;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  background: var(--color-elevated);
}
.nav-item--active .nav-item__icon {
  background: oklch(0.78 0.13 75 / 0.20);
  color: var(--color-accent);
}
.nav-item__label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.nav-item__meta {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  flex-shrink: 0;
}

/* ==========================================================================
   Content Area (FIX #1: no max-height, natural scroll)
   ========================================================================== */
.content {
  padding: var(--space-8);
  min-height: calc(100vh - 52px);
}
@media (max-width: 768px) {
  .content { padding: var(--space-4); }
}

/* ==========================================================================
   Cards / Panels
   ========================================================================== */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: var(--space-6);
  transition: transform 300ms var(--ease-snappy), box-shadow 300ms var(--ease-snappy);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  background: var(--color-elevated);
  border-bottom: 1px solid var(--color-border-subtle);
}
.card__title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  letter-spacing: -0.01em;
}
.card__body { padding: var(--space-6); }
.card__body--flush { padding: 0; }

/* ==========================================================================
   Stats Grid
   ========================================================================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}
.stat {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-6);
  transition: transform 200ms var(--ease-snappy), box-shadow 200ms var(--ease-snappy);
  cursor: default;
}
.stat:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.stat:active {
  transform: translateY(1px);
  box-shadow: var(--shadow-sm);
}
.stat__value {
  font-family: var(--font-display);
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--color-accent);
  letter-spacing: -0.03em;
  line-height: 1.1;
}
.stat__label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: var(--space-1);
}

/* ==========================================================================
   Data Table
   ========================================================================== */
.data-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
}
.data-table th {
  text-align: left;
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
  background: var(--color-elevated);
  border-bottom: 1px solid var(--color-border);
  position: sticky;
  top: 0;
  z-index: 2;
}
.data-table td {
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-border-subtle);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  white-space: nowrap;
}
.data-table tr:hover td { background: oklch(0.10 0.01 260); }
.cell--primary { color: var(--color-text); font-weight: 500; }
.cell--accent  { color: var(--color-accent); }
.cell--success { color: var(--color-success); }
.cell--muted   { color: var(--color-text-muted); }
.cell--link    { color: var(--color-accent); cursor: pointer; text-decoration: underline; }

/* ==========================================================================
   Validation
   ========================================================================== */
.validation-badge {
  display: inline-flex;
  padding: var(--space-1) var(--space-3);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.validation-badge--pass {
  background: var(--color-success-dim);
  color: var(--color-success);
  border: 1px solid oklch(0.70 0.15 145 / 0.25);
}
.validation-badge--fail {
  background: var(--color-error-dim);
  color: var(--color-error);
  border: 1px solid oklch(0.65 0.20 25 / 0.25);
}
.issue-item {
  display: flex;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-sm);
  margin-bottom: var(--space-2);
  font-size: var(--text-sm);
}
.issue-item--error    { background: var(--color-error-dim);   border-left: 3px solid var(--color-error); }
.issue-item--critical { background: var(--color-error-dim);   border-left: 3px solid var(--color-error); }
.issue-item--warning  { background: var(--color-warning-dim); border-left: 3px solid var(--color-warning); }
.issue-item--info     { background: var(--color-info-dim);    border-left: 3px solid var(--color-info); }
.issue-item__sev {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  min-width: 48px;
}
.issue-item__body { flex: 1; font-family: var(--font-body); }
.issue-item__body strong { font-weight: 600; color: var(--color-text); }
.issue-item__body code {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  background: var(--color-elevated);
  padding: 1px 6px;
  border-radius: var(--radius-sm);
}
.issue-item__body em {
  display: block;
  margin-top: var(--space-1);
  color: var(--color-text-muted);
  font-style: normal;
  font-size: var(--text-xs);
}

/* ==========================================================================
   Graph View — Bytecode Nodes (FIX #8: wider max-width)
   ========================================================================== */
.graph-viewport {
  background: var(--color-bg);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
  min-height: 200px;
  padding: var(--space-4);
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-3);
  align-content: flex-start;
}
.graph-node {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  min-width: 160px;
  max-width: 360px;
  transition: transform 200ms var(--ease-snappy), box-shadow 200ms var(--ease-snappy), border-color 200ms;
  cursor: default;
}
.graph-node:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 16px var(--color-accent-glow);
  border-color: var(--color-accent);
}
.graph-node__opcode {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  letter-spacing: 0.02em;
}
.graph-node__name {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
  margin-top: 2px;
  word-break: break-word;
}
.graph-node__props {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: var(--space-2);
  line-height: 1.5;
  word-break: break-word;
}
.graph-node--flow     { border-left: 3px solid var(--color-accent); }
.graph-node--call     { border-left: 3px solid var(--color-success); }
.graph-node--data     { border-left: 3px solid oklch(0.72 0.15 300); }
.graph-node--literal  { border-left: 3px solid oklch(0.75 0.12 40); }
.graph-node--variable { border-left: 3px solid var(--color-warning); }
.graph-node--other    { border-left: 3px solid var(--color-text-muted); }

/* ==========================================================================
   Plugin Validation
   ========================================================================== */
.plugin-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-6);
  overflow: hidden;
}
.plugin-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-border-subtle);
  background: var(--color-elevated);
}
.plugin-card__name {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 600;
  color: var(--color-text);
  letter-spacing: -0.01em;
}
.plugin-card__version {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--color-text-secondary);
  margin-left: var(--space-3);
}
.plugin-card__badges {
  display: flex;
  gap: var(--space-2);
  align-items: center;
}
.plugin-badge {
  display: inline-flex;
  padding: var(--space-1) var(--space-3);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.05em;
}
.plugin-badge--pass {
  background: var(--color-success-dim);
  color: var(--color-success);
  border: 1px solid oklch(0.70 0.15 145 / 0.25);
}
.plugin-badge--fail {
  background: var(--color-error-dim);
  color: var(--color-error);
  border: 1px solid oklch(0.65 0.20 25 / 0.25);
}
.plugin-badge--warn {
  background: var(--color-warning-dim);
  color: var(--color-warning);
  border: 1px solid oklch(0.72 0.14 85 / 0.25);
}
.plugin-badge--info {
  background: var(--color-info-dim);
  color: var(--color-info);
  border: 1px solid oklch(0.75 0.12 220 / 0.25);
}
.plugin-card__body {
  padding: var(--space-4) var(--space-6);
}
.plugin-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.plugin-meta-item {
  background: var(--color-bg);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-sm);
  padding: var(--space-3);
}
.plugin-meta-item__label {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-1);
}
.plugin-meta-item__value {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  color: var(--color-text);
}
.plugin-section {
  margin-top: var(--space-4);
}
.plugin-section__title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--color-border-subtle);
}
.plugin-module {
  background: var(--color-bg);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-2);
}
.plugin-module__name {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-accent);
}
.plugin-module__detail {
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin-top: var(--space-1);
}
.plugin-issue {
  display: flex;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  margin-bottom: var(--space-1);
  font-family: var(--font-body);
  font-size: var(--text-sm);
}
.plugin-issue--error {
  background: var(--color-error-dim);
  color: var(--color-error);
  border-left: 3px solid var(--color-error);
}
.plugin-issue--warning {
  background: var(--color-warning-dim);
  color: var(--color-warning);
  border-left: 3px solid var(--color-warning);
}
.plugin-issue--info {
  background: var(--color-info-dim);
  color: var(--color-info);
  border-left: 3px solid var(--color-info);
}
.plugin-issue__severity {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: var(--text-xs);
  text-transform: uppercase;
  min-width: 50px;
}
.plugin-dep-chip {
  display: inline-flex;
  padding: var(--space-1) var(--space-2);
  background: var(--color-elevated);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  margin: 2px;
}
.plugin-dep-chip--enabled {
  border-color: var(--color-success);
  color: var(--color-success);
}
.plugin-dep-chip--optional {
  border-color: var(--color-text-muted);
  color: var(--color-text-muted);
  border-style: dashed;
}
.plugin-empty {
  text-align: center;
  padding: var(--space-12);
  color: var(--color-text-muted);
  font-family: var(--font-body);
  font-size: var(--text-base);
}
.plugin-score {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}
.plugin-score__bar {
  flex: 1;
  height: 8px;
  background: var(--color-bg);
  border-radius: 4px;
  overflow: hidden;
}
.plugin-score__fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s var(--ease-cinematic);
}
.plugin-score__label {
  font-family: var(--font-mono);
  font-size: var(--text-lg);
  font-weight: 700;
}

/* ==========================================================================
   Level Logic View (FIX #2: no max-height on graph containers)
   ========================================================================== */
.level-cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-8);
}
.level-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.level-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-4) var(--space-6);
  background: var(--color-elevated);
  border-bottom: 1px solid var(--color-border-subtle);
}
.level-card__title {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
}
.level-card__badges {
  display: flex;
  gap: var(--space-2);
  align-items: center;
}
.level-card__stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: var(--space-3);
  padding: var(--space-4) var(--space-6);
  border-bottom: 1px solid var(--color-border-subtle);
}
.level-stat__value {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  color: var(--color-accent);
  letter-spacing: -0.02em;
}
.level-stat__label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Collapsible sections (FIX #6) */
.level-card__section {
  border-bottom: 1px solid var(--color-border-subtle);
}
.level-card__section:last-child { border-bottom: none; }
.level-section__toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: var(--space-3) var(--space-6);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-text-muted);
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: color 150ms, background 150ms;
  outline: none;
}
.level-section__toggle:hover,
.level-section__toggle:focus-visible {
  color: var(--color-text);
  background: oklch(0.10 0.01 260);
}
.level-section__toggle::after {
  content: '\25B6';
  font-size: var(--text-xs);
  transition: transform 200ms var(--ease-snappy);
}
.level-section__toggle--open::after {
  transform: rotate(90deg);
}
.level-section__body {
  display: none;
  padding: 0 var(--space-6) var(--space-4);
}
.level-section__body--open {
  display: block;
}

/* K2 Node group (FIX #3: proper CSS classes) */
.k2-group {
  margin-bottom: var(--space-4);
}
.k2-group:last-child { margin-bottom: 0; }
.k2-group__header {
  font-family: var(--font-display);
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-2);
}
.k2-group__nodes {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.logic-badge {
  display: inline-flex;
  padding: var(--space-1) var(--space-3);
  border-radius: 100px;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 500;
}
.logic-badge--active {
  background: var(--color-success-dim);
  color: var(--color-success);
  border: 1px solid oklch(0.70 0.15 145 / 0.25);
}
.logic-badge--empty {
  background: var(--color-elevated);
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
}

.actor-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--color-elevated);
  border: 1px solid var(--color-border-subtle);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  transition: border-color 150ms, background 150ms;
}
.actor-chip:hover {
  border-color: var(--color-accent);
  background: var(--color-accent-dim);
}
.actor-chip__dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.actor-chip__dot--bp {
  background: var(--color-success);
  box-shadow: 0 0 4px var(--color-success);
}
.actor-chip__dot--actor { background: var(--color-text-muted); }

.level-logic-empty {
  text-align: center;
  padding: var(--space-6);
  color: var(--color-text-muted);
  font-size: var(--text-sm);
}

/* ==========================================================================
   Property Table
   ========================================================================== */
.prop-table { width: 100%; border-collapse: collapse; }
.prop-table td {
  padding: var(--space-2) var(--space-4);
  border-bottom: 1px solid var(--color-border-subtle);
  font-size: var(--text-sm);
  vertical-align: top;
}
.prop-table .prop-key {
  font-family: var(--font-body);
  font-weight: 500;
  color: var(--color-text-muted);
  width: 180px;
  white-space: nowrap;
}
.prop-table .prop-val {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-secondary);
  word-break: break-word;
}
.prop-table tr:last-child td { border-bottom: none; }

/* ==========================================================================
   Back Link
   ========================================================================== */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text-muted);
  cursor: pointer;
  margin-bottom: var(--space-4);
  transition: color 150ms;
}
.back-link:hover { color: var(--color-accent); text-decoration: none; }

/* ==========================================================================
   Empty / Loading
   ========================================================================== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: var(--space-16) var(--space-6);
  min-height: 50vh;
}
.empty-state__icon {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  color: var(--color-text-muted);
  opacity: 0.25;
  margin-bottom: var(--space-4);
}
.empty-state__title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-2);
}
.empty-state__desc {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  max-width: 40ch;
}
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  padding: var(--space-12);
  color: var(--color-text-muted);
  font-size: var(--text-sm);
}
.loading__spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--color-border);
  border-top-color: var(--color-accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ==========================================================================
   Animations
   ========================================================================== */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeSlideIn 400ms var(--ease-cinematic) forwards;
  opacity: 0;
}
.animate-in:nth-child(1) { animation-delay: 0ms; }
.animate-in:nth-child(2) { animation-delay: 50ms; }
.animate-in:nth-child(3) { animation-delay: 100ms; }
.animate-in:nth-child(4) { animation-delay: 150ms; }
.animate-in:nth-child(5) { animation-delay: 200ms; }
.animate-in:nth-child(6) { animation-delay: 250ms; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ==========================================================================
   Scrollbar
   ========================================================================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }
</style>
</head>
<body>

<div class="app-layout">
  <header class="app-header">
    <div class="app-header__brand">
      UE 5.6 Level Editor<em>JARVIS Dashboard</em>
    </div>
    <div class="app-header__meta">
      <span id="fileBadges"></span>
      <div class="status-indicator">
        <span class="status-indicator__dot" id="statusDot"></span>
        <span id="statusText">Connecting</span>
      </div>
    </div>
  </header>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__heading">Views</div>
      <ul>
        <li class="nav-item nav-item--active" data-view="overview" tabindex="0" role="button">
          <span class="nav-item__icon">O</span><span class="nav-item__label">Overview</span>
        </li>
        <li class="nav-item" data-view="actors" tabindex="0" role="button">
          <span class="nav-item__icon">A</span><span class="nav-item__label">Actors</span>
        </li>
        <li class="nav-item" data-view="exports" tabindex="0" role="button">
          <span class="nav-item__icon">E</span><span class="nav-item__label">Exports</span>
        </li>
        <li class="nav-item" data-view="imports" tabindex="0" role="button">
          <span class="nav-item__icon">I</span><span class="nav-item__label">Imports</span>
        </li>
        <li class="nav-item" data-view="functions" tabindex="0" role="button">
          <span class="nav-item__icon">F</span><span class="nav-item__label">Functions</span>
        </li>
        <li class="nav-item" data-view="validation" tabindex="0" role="button">
          <span class="nav-item__icon">V</span><span class="nav-item__label">Validation</span>
        </li>
        <li class="nav-item" data-view="level-logic" tabindex="0" role="button">
          <span class="nav-item__icon">L</span><span class="nav-item__label">Level Logic</span>
        </li>
        <li class="nav-item" data-view="plugins" tabindex="0" role="button">
          <span class="nav-item__icon">P</span><span class="nav-item__label">Plugins</span>
        </li>
      </ul>
    </div>
    <div class="sidebar__section" id="actorListSection" style="display:none;">
      <div class="sidebar__heading">
        Actors <span class="count-badge" id="actorCount">0</span>
      </div>
      <ul id="actorList"></ul>
    </div>
  </nav>

  <main class="content" id="content">
    <div class="empty-state">
      <div class="empty-state__icon">[ ]</div>
      <div class="empty-state__title">No Asset Loaded</div>
      <div class="empty-state__desc">JARVIS will load a .umap or .uasset file to begin inspection.</div>
    </div>
  </main>
</div>

<script>
/* =========================================================================
   State
   ========================================================================= */
const S = {
  loaded: false,
  summary: null,
  view: 'overview',
  actor: null,
  graph: null,
  cache: {},
  // Track which collapsible sections are open
  openSections: {}
};

/* =========================================================================
   API helper
   ========================================================================= */
async function api(path) {
  const r = await fetch('/api/' + path);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

/* =========================================================================
   Init
   ========================================================================= */
async function boot() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  try {
    const st = await api('status');
    if (st.loaded) {
      dot.className = 'status-indicator__dot status-indicator__dot--ok';
      txt.textContent = 'Connected';
      S.loaded = true;
      S.summary = await api('summary');
      renderBadges();
      navigate('overview');
    } else {
      dot.className = 'status-indicator__dot';
      txt.textContent = 'No asset loaded';
    }
  } catch (e) {
    dot.className = 'status-indicator__dot status-indicator__dot--err';
    txt.textContent = 'Offline';
  }
}

function renderBadges() {
  const el = document.getElementById('fileBadges');
  const s = S.summary;
  let h = '';
  if (s.is_map) h += '<span class="file-badge file-badge--map">MAP</span> ';
  else h += '<span class="file-badge file-badge--asset">ASSET</span> ';
  h += '<span class="file-badge file-badge--version">UE ' + esc(s.engine_version) + '</span>';
  el.innerHTML = h;
}

/* =========================================================================
   Navigation (FIX #10: keyboard support)
   ========================================================================= */
document.querySelectorAll('.nav-item[data-view]').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.view));
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(el.dataset.view); }
  });
});

function navigate(view) {
  S.view = view;
  document.querySelectorAll('.nav-item[data-view]').forEach(n => {
    n.classList.toggle('nav-item--active', n.dataset.view === view);
  });
  // Scroll content to top on view change
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0, 0);
  render();
}

/* =========================================================================
   Render dispatcher
   ========================================================================= */
async function render() {
  const c = document.getElementById('content');
  if (!S.loaded) return;
  c.innerHTML = '<div class="loading"><div class="loading__spinner"></div>Loading</div>';
  try {
    switch (S.view) {
      case 'overview':     c.innerHTML = renderOverview(); break;
      case 'actors':       await renderActors(c); break;
      case 'exports':      await renderExports(c); break;
      case 'imports':      await renderImports(c); break;
      case 'functions':    await renderFunctions(c); break;
      case 'validation':   await renderValidation(c); break;
      case 'actor-detail': await renderActorDetail(c); break;
      case 'graph':        await renderGraph(c); break;
      case 'level-logic':  await renderLevelLogic(c); break;
      case 'plugins':      await renderPlugins(c); break;
    }
  } catch (e) {
    c.innerHTML = '<div class="empty-state"><div class="empty-state__title">Error</div><div class="empty-state__desc">' + esc(e.message) + '</div></div>';
  }
}

/* =========================================================================
   Overview
   ========================================================================= */
function renderOverview() {
  const s = S.summary;
  return `
    <div class="stats-grid">
      <div class="stat animate-in"><div class="stat__value">${s.export_count}</div><div class="stat__label">Exports</div></div>
      <div class="stat animate-in"><div class="stat__value">${s.import_count}</div><div class="stat__label">Imports</div></div>
      <div class="stat animate-in"><div class="stat__value">${s.name_count}</div><div class="stat__label">Names</div></div>
      <div class="stat animate-in"><div class="stat__value">${s.actor_count}</div><div class="stat__label">Actors</div></div>
      <div class="stat animate-in"><div class="stat__value">${s.class_exports}</div><div class="stat__label">Classes</div></div>
      <div class="stat animate-in"><div class="stat__value">${s.function_exports}</div><div class="stat__label">Functions</div></div>
    </div>
    <div class="card animate-in">
      <div class="card__header"><div class="card__title">Asset Details</div></div>
      <div class="card__body card__body--flush">
        <table class="prop-table">
          <tr><td class="prop-key">File Path</td><td class="prop-val">${esc(s.filepath)}</td></tr>
          <tr><td class="prop-key">Engine Version</td><td class="prop-val">UE ${esc(s.engine_version)}</td></tr>
          <tr><td class="prop-key">Type</td><td class="prop-val">${s.is_map ? 'Level Map (.umap)' : 'Asset (.uasset)'}</td></tr>
          <tr><td class="prop-key">Has Level Export</td><td class="prop-val" style="color:${s.has_level_export ? 'var(--color-success)' : 'var(--color-text-muted)'}">${s.has_level_export ? 'Yes' : 'No'}</td></tr>
        </table>
      </div>
    </div>`;
}

/* =========================================================================
   Actors
   ========================================================================= */
async function renderActors(el) {
  if (!S.cache.actors) S.cache.actors = await api('actors');
  const actors = S.cache.actors;
  const sec = document.getElementById('actorListSection');
  const ul = document.getElementById('actorList');
  document.getElementById('actorCount').textContent = actors.length;
  sec.style.display = 'block';
  ul.innerHTML = actors.map(a =>
    '<li class="nav-item" data-actor-name="' + esc(a.object_name) + '" tabindex="0" role="button">' +
    '<span class="nav-item__icon" style="color:' + (a.has_blueprint ? 'var(--color-success)' : '') + '">' + (a.has_blueprint ? 'B' : 'A') + '</span>' +
    '<span class="nav-item__label">' + esc(a.object_name) + '</span>' +
    '<span class="nav-item__meta">' + a.component_count + '</span></li>'
  ).join('');
  ul.querySelectorAll('[data-actor-name]').forEach(li => {
    const go = () => { S.actor = li.dataset.actorName; S.view = 'actor-detail'; render(); };
    li.addEventListener('click', go);
    li.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
  });

  el.innerHTML = `
    <div class="card animate-in">
      <div class="card__header">
        <div class="card__title">Level Actors</div>
        <span class="file-badge file-badge--version">${actors.length}</span>
      </div>
      <div class="card__body card__body--flush">
        <div class="data-table-wrap" style="max-height:600px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>#</th><th>Class</th><th>Name</th><th>BP</th><th>Comp</th><th>Props</th></tr></thead>
            <tbody>${actors.map((a, i) =>
              '<tr style="cursor:pointer" onclick="goActor(\'' + esc(a.object_name) + '\')">' +
              '<td>' + i + '</td>' +
              '<td class="cell--primary">' + esc(a.class_name) + '</td>' +
              '<td>' + esc(a.object_name) + '</td>' +
              '<td class="' + (a.has_blueprint ? 'cell--success' : 'cell--muted') + '">' + (a.has_blueprint ? 'Yes' : '-') + '</td>' +
              '<td>' + a.component_count + '</td>' +
              '<td>' + a.property_count + '</td></tr>'
            ).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function goActor(name) { S.actor = name; S.view = 'actor-detail'; render(); }

/* =========================================================================
   Actor Detail
   ========================================================================= */
async function renderActorDetail(el) {
  if (!S.actor) { navigate('actors'); return; }
  const a = await api('actor/' + encodeURIComponent(S.actor));

  let html = '<a class="back-link" onclick="navigate(\'actors\')">&larr; Back to Actors</a>';
  html += `<div class="card animate-in">
    <div class="card__header">
      <div class="card__title">${esc(a.object_name)}</div>
      <span class="file-badge file-badge--version">${esc(a.class_name)}</span>
    </div>
    <div class="card__body card__body--flush">
      <table class="prop-table">
        <tr><td class="prop-key">Export Index</td><td class="prop-val">${a.export_index}</td></tr>
        <tr><td class="prop-key">Class</td><td class="prop-val">${esc(a.class_name)}</td></tr>
        <tr><td class="prop-key">Outer</td><td class="prop-val">${esc(a.outer_name)}</td></tr>
        <tr><td class="prop-key">Blueprint</td><td class="prop-val" style="color:${a.has_blueprint ? 'var(--color-success)' : 'var(--color-text-muted)'}">${a.has_blueprint ? 'Yes' : 'No'}</td></tr>
        <tr><td class="prop-key">Components</td><td class="prop-val">${a.component_count}</td></tr>
      </table>
    </div>
  </div>`;

  if (a.properties && a.properties.length > 0) {
    html += `<div class="card animate-in">
      <div class="card__header"><div class="card__title">Properties</div><span class="file-badge file-badge--version">${a.properties.length}</span></div>
      <div class="card__body card__body--flush">
        <div class="data-table-wrap" style="max-height:500px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Type</th><th>Value</th></tr></thead>
            <tbody>${a.properties.map(p =>
              '<tr><td class="cell--primary">' + esc(p.name) + '</td>' +
              '<td class="cell--accent">' + esc(p.type) + '</td>' +
              '<td>' + esc(trunc(String(p.value), 80)) + '</td></tr>'
            ).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }

  if (a.components && a.components.length > 0) {
    html += `<div class="card animate-in">
      <div class="card__header"><div class="card__title">Components</div><span class="file-badge file-badge--version">${a.components.length}</span></div>
      <div class="card__body card__body--flush">
        <div class="data-table-wrap" style="max-height:500px;overflow-y:auto;">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Class</th><th>Props</th></tr></thead>
            <tbody>${a.components.map(c =>
              '<tr><td class="cell--primary">' + esc(c.name) + '</td>' +
              '<td class="cell--accent">' + esc(c.class_name) + '</td>' +
              '<td>' + c.property_count + '</td></tr>'
            ).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }

  el.innerHTML = html;
}

/* =========================================================================
   Exports
   ========================================================================= */
async function renderExports(el) {
  if (!S.cache.exports) S.cache.exports = await api('exports');
  const data = S.cache.exports;

  el.innerHTML = `<div class="card animate-in">
    <div class="card__header"><div class="card__title">Exports</div><span class="file-badge file-badge--version">${data.length}</span></div>
    <div class="card__body card__body--flush">
      <div class="data-table-wrap" style="max-height:700px;overflow-y:auto;">
        <table class="data-table">

/* =========================================================================
   Level Logic (FIX #1,#2,#3,#6,#8: full rewrite)
   ========================================================================= */
async function renderLevelLogic(el) {
  let levels;
  try { levels = await api('levels'); } catch (e) { levels = []; }

  if (levels.length === 0) {
    el.innerHTML = `<div class="card animate-in">
      <div class="card__header"><div class="card__title">Level Logic</div></div>
      <div class="card__body"><div class="level-logic-empty">No levels loaded. JARVIS will load .umap files via the multi-load API.</div></div>
    </div>`;
    return;
  }

  let html = '<div class="level-cards">';

  for (const lvl of levels) {
    const s = lvl.summary;
    const fn = lvl.filename;
    const hasBC = lvl.functions.some(f => f.has_bytecode);
    const fnWithBC = lvl.functions.filter(f => f.has_bytecode);
    const levelId = fn.replace(/[^a-zA-Z0-9]/g, '_');

    html += '<div class="level-card animate-in">';

    // Header
    html += `<div class="level-card__header">
      <div class="level-card__title">${esc(fn.replace('.umap',''))}</div>
      <div class="level-card__badges">
        <span class="logic-badge ${hasBC ? 'logic-badge--active' : 'logic-badge--empty'}">${hasBC ? 'Compiled Logic' : 'No Bytecode'}</span>
        <span class="file-badge file-badge--version">UE ${esc(s.engine_version)}</span>
      </div>
    </div>`;

    // Stats
    html += `<div class="level-card__stats">
      <div class="level-stat"><div class="level-stat__value">${s.export_count}</div><div class="level-stat__label">Exports</div></div>
      <div class="level-stat"><div class="level-stat__value">${s.import_count}</div><div class="level-stat__label">Imports</div></div>
      <div class="level-stat"><div class="level-stat__value">${s.actor_count}</div><div class="level-stat__label">Actors</div></div>
      <div class="level-stat"><div class="level-stat__value">${lvl.functions.length}</div><div class="level-stat__label">Functions</div></div>
      <div class="level-stat"><div class="level-stat__value">${fnWithBC.length}</div><div class="level-stat__label">With Bytecode</div></div>
    </div>`;

    // Blueprint class — collapsible
    if (lvl.blueprint_class) {
      const secId = levelId + '_bp';
      html += `<div class="level-card__section">
        <button class="level-section__toggle level-section__toggle--open" data-section="${secId}" onclick="toggleSection(this,'${secId}')">
          Blueprint Class: ${esc(lvl.blueprint_class.class_name)}
        </button>
        <div class="level-section__body level-section__body--open" id="section-${secId}">
          ${lvl.blueprint_class.functions && lvl.blueprint_class.functions.length > 0 ?
            '<div style="font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.8;">Functions: ' +
            lvl.blueprint_class.functions.map(f => '<span style="color:' + (f.has_bytecode ? 'var(--color-success)' : 'var(--color-text-muted)') + ';">' + esc(f.name) + '</span>').join(', ') + '</div>' : ''}
        </div>
      </div>`;
    }

    // Actors — collapsible
    if (lvl.actors.length > 0) {
      const secId = levelId + '_actors';
      html += `<div class="level-card__section">
        <button class="level-section__toggle level-section__toggle--open" data-section="${secId}" onclick="toggleSection(this,'${secId}')">
          Actors (${lvl.actors.length})
        </button>
        <div class="level-section__body level-section__body--open" id="section-${secId}">
          <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);">
            ${lvl.actors.map(a =>
              '<div class="actor-chip">' +
              '<span class="actor-chip__dot ' + (a.has_blueprint ? 'actor-chip__dot--bp' : 'actor-chip__dot--actor') + '"></span>' +
              esc(a.class_name) + ' <span style="color:var(--color-text-muted);">(' + esc(a.object_name) + ')</span></div>'
            ).join('')}
          </div>
        </div>
      </div>`;
    }

    // K2 Nodes — collapsible, async loaded
    const secIdK2 = levelId + '_k2';
    html += `<div class="level-card__section">
      <button class="level-section__toggle level-section__toggle--open" data-section="${secIdK2}" onclick="toggleSection(this,'${secIdK2}')">
        Blueprint Nodes (Editor View)
      </button>
      <div class="level-section__body level-section__body--open" id="section-${secIdK2}">
        <div id="k2nodes-${esc(fn)}"><div class="loading"><div class="loading__spinner"></div>Loading nodes</div></div>
      </div>
    </div>`;

    // Compiled bytecode functions — each collapsible
    if (fnWithBC.length > 0) {
      for (const func of fnWithBC) {
        const secIdGraph = levelId + '_graph_' + func.export_index;
        html += `<div class="level-card__section">
          <button class="level-section__toggle" data-section="${secIdGraph}" onclick="toggleSection(this,'${secIdGraph}')">
            Compiled: ${esc(func.name)} (${func.bytecode_size} bytes)
          </button>
          <div class="level-section__body" id="section-${secIdGraph}">
            <div id="graph-${esc(fn)}-${func.export_index}"><div class="loading"><div class="loading__spinner"></div>Loading graph</div></div>
          </div>
        </div>`;
      }
    } else {
      html += `<div class="level-card__section">
        <div style="padding:var(--space-3) var(--space-6);">
          <div class="level-logic-empty">Extras cleared to byte[0] — no compiled bytecode. Nodes exist as disconnected islands in the editor.</div>
        </div>
      </div>`;
    }

    html += '</div>'; // close level-card
  }

  html += '</div>'; // close level-cards
  el.innerHTML = html;

  // Async load K2 nodes and bytecode graphs
  for (const lvl of levels) {
    const fn = lvl.filename;
    const fnWithBC = lvl.functions.filter(f => f.has_bytecode);

    // K2 Nodes
    const k2Container = document.getElementById('k2nodes-' + fn);
    if (k2Container) {
      let k2Loaded = false;
      const targetFunc = fnWithBC.length > 0 ? fnWithBC[0] : (lvl.functions.length > 0 ? lvl.functions[0] : null);
      if (targetFunc) {
        try {
          const g = await api('level/' + encodeURIComponent(fn) + '/graph/' + targetFunc.export_index);
          if (g.k2_nodes && g.k2_nodes.length > 0) {
            const byType = {};
            for (const k of g.k2_nodes) {
              if (k.class_name === 'EdGraph') continue;
              const t = k.node_type;
              if (!byType[t]) byType[t] = [];
              byType[t].push(k);
            }
            k2Container.innerHTML = Object.entries(byType).map(([type, nodes]) =>
              '<div class="k2-group">' +
              '<div class="k2-group__header">' + esc(type) + ' (' + nodes.length + ')</div>' +
              '<div class="k2-group__nodes">' +
              nodes.map(k => {
                const cat = k2TypeToCategory(k.class_name);
                return '<div class="graph-node graph-node--' + cat + '">' +
                  '<div class="graph-node__opcode">' + esc(k.class_name) + '</div>' +
                  '<div class="graph-node__name">' + esc(k.readable_name) + '</div>' +
                  (k.pos_x || k.pos_y ? '<div class="graph-node__props">Position: (' + k.pos_x + ', ' + k.pos_y + ')</div>' : '') +
                  '</div>';
              }).join('') +
              '</div></div>'
            ).join('');
            k2Loaded = true;
          }
        } catch (e) { /* fall through */ }
      }
      if (!k2Loaded) {
        k2Container.innerHTML = '<div class="level-logic-empty">No K2Node metadata found</div>';
      }
    }

    // Bytecode graphs — only load if section is open
    for (const func of fnWithBC) {
      const container = document.getElementById('graph-' + fn + '-' + func.export_index);
      if (!container) continue;
      // Check if section is visible (open)
      const section = container.closest('.level-section__body');
      if (section && !section.classList.contains('level-section__body--open')) {
        // Mark for lazy load
        container.dataset.lazyUrl = 'level/' + encodeURIComponent(fn) + '/graph/' + func.export_index;
        container.innerHTML = '<div class="level-logic-empty" style="font-style:italic;">Expand section to load graph</div>';
        continue;
      }
      await loadGraphIntoContainer(container, 'level/' + encodeURIComponent(fn) + '/graph/' + func.export_index);
    }
  }
}

async function loadGraphIntoContainer(container, url) {
  try {
    const g = await api(url);
    if (g.nodes && g.nodes.length > 0) {
      container.innerHTML = '<div class="graph-viewport">' + g.nodes.map(n =>
        '<div class="graph-node graph-node--' + n.category + '">' +
        '<div class="graph-node__opcode">[' + n.opcode_hex + '] ' + esc(n.opcode) + '</div>' +
        '<div class="graph-node__name">' + esc(n.display_name) + '</div>' +
        (Object.keys(n.properties).length > 0 ?
          '<div class="graph-node__props">' +
          Object.entries(n.properties).map(([k,v]) => esc(k) + ': ' + esc(trunc(v,60))).join('<br>') +
          '</div>' : '') +
        '</div>'
      ).join('') + '</div>';
    } else {
      container.innerHTML = '<div class="level-logic-empty">No parsed nodes</div>';
    }
  } catch (e) {
    container.innerHTML = '<div class="level-logic-empty">Failed to load graph: ' + esc(e.message) + '</div>';
  }
}

/* =========================================================================
   Collapsible Section Toggle (FIX #6)
   ========================================================================= */
function toggleSection(btn, secId) {
  const body = document.getElementById('section-' + secId);
  if (!body) return;
  const isOpen = body.classList.contains('level-section__body--open');
  body.classList.toggle('level-section__body--open');
  btn.classList.toggle('level-section__toggle--open');

  // Lazy load graphs when section is opened
  if (!isOpen) {
    const lazyContainers = body.querySelectorAll('[data-lazy-url]');
    lazyContainers.forEach(c => {
      const url = c.dataset.lazyUrl;
      if (url) {
        delete c.dataset.lazyUrl;
        c.innerHTML = '<div class="loading"><div class="loading__spinner"></div>Loading graph</div>';
        loadGraphIntoContainer(c, url);
      }
    });
  }
}

function k2TypeToCategory(className) {
  if (className.includes('Event') || className.includes('IfThenElse')) return 'flow';
  if (className.includes('CallFunction') || className.includes('GetSubsystem') || className.includes('AsyncAction')) return 'call';
  if (className.includes('MakeStruct') || className.includes('BreakStruct') || className.includes('Cast') || className.includes('Convert')) return 'data';
  if (className.includes('Literal') || className.includes('Knot')) return 'literal';
  if (className.includes('Variable') || className.includes('Delegate')) return 'variable';
  return 'other';
}

async function renderPlugins(c) {
  let plugins;
  try {
    const res = await fetch('/api/plugins');
    plugins = await res.json();
  } catch (e) {
    plugins = [];
  }

  if (!plugins || plugins.length === 0) {
    c.innerHTML = `
      <div class="card">
        <div class="card__header"><h2 class="card__title">Plugin Validation</h2></div>
        <div class="card__body">
          <div class="plugin-empty">
            No plugins validated yet. JARVIS will scan plugin directories via the API.<br>
            <span style="font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-2);display:block;">Endpoints: POST /api/plugin/validate, POST /api/plugin/scan</span>
          </div>

    return;

  let html = '<div style="margin-bottom:var(--space-4);">';
  html += '<h2 style="font-family:var(--font-display);font-size:var(--text-2xl);font-weight:700;color:var(--color-text);letter-spacing:-0.02em;margin-bottom:var(--space-2);">Plugin Validation</h2>';

    const errCount = (p.errors || []).length;
    const warnCount = (p.warnings || []).length;
    const infoCount = (p.info || []).length;
    const passed = errCount === 0;

    // Header

    html += '<div class="plugin-card__badges">';
    html += '<span class="plugin-badge ' + (passed ? 'plugin-badge--pass' : 'plugin-badge--fail') + '">' + (passed ? 'VALID' : 'ISSUES') + '</span>';

    if (warnCount > 0) html += '<span class="plugin-badge plugin-badge--warn">' + warnCount + ' Warning' + (warnCount !== 1 ? 's' : '') + '</span>';
    html += '</div>';
    html += '</div>';

    // Body
    html += '<div class="plugin-card__body">';

    // Score bar
    html += '<div class="plugin-score">';
    html += '<span class="plugin-score__label" style="color:' + scoreColor + ';">' + score + '</span>';
    html += '<div class="plugin-score__bar"><div class="plugin-score__fill" style="width:' + score + '%;background:' + scoreColor + ';"></div></div>';
    html += '</div>';

    // Meta grid
    html += '<div class="plugin-meta-grid">';
    const metaItems = [
      ['Category', p.category || 'N/A'],
      ['Created By', p.created_by || 'N/A'],
      ['Engine Version', p.engine_version || 'N/A'],
      ['Type', p.type || 'N/A'],
      ['Can Contain Content', p.can_contain_content != null ? (p.can_contain_content ? 'Yes' : 'No') : 'N/A'],
      ['Installed', p.installed != null ? (p.installed ? 'Yes' : 'No') : 'N/A'],
      ['Enabled by Default', p.enabled_by_default != null ? (p.enabled_by_default ? 'Yes' : 'No') : 'N/A'],

    // Issues
    const allIssues = [
      ...(p.errors || []).map(i => ({...i, severity: 'error'})),
      ...(p.warnings || []).map(i => ({...i, severity: 'warning'})),
      ...(p.info || []).map(i => ({...i, severity: 'info'})),
    ];
    if (allIssues.length > 0) {
      html += '<div class="plugin-section">';
      html += '<div class="plugin-section__title">Issues (' + allIssues.length + ')</div>';
      for (const issue of allIssues) {
        html += '<div class="plugin-issue plugin-issue--' + issue.severity + '">';
        html += '<span class="plugin-issue__severity">' + issue.severity.toUpperCase() + '</span>';
        html += '<span>' + esc(issue.message || issue.msg || JSON.stringify(issue)) + '</span>';
        html += '</div>';
      }
      html += '</div>';
    }

    html += '</div>'; // card body
    html += '</div>'; // plugin-card
  }

  c.innerHTML = html;

  // Animate score bars
  setTimeout(() => {
    c.querySelectorAll('.plugin-score__fill').forEach(el => {
      el.style.width = el.style.width; // trigger reflow
    });
  }, 50);
}

/* =========================================================================
   Helpers
   ========================================================================= */
function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function trunc(s, n) { return s && s.length > n ? s.slice(0, n - 3) + '...' : (s || ''); }
function fmtBytes(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB'];
  const i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(1) + ' ' + u[i];
}

/* =========================================================================
   Boot
   ========================================================================= */
boot();
setInterval(() => { if (!S.loaded) boot(); }, 5000);
</script>
